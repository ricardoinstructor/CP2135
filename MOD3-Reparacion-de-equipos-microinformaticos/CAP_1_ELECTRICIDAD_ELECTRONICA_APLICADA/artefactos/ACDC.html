<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diferencia entre AC y DC - Simulador Interactivo</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
        }
        canvas {
            border-radius: 8px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }
        .card {
            transition: all 0.3s ease;
        }
        .toggle-btn.active {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Componente de Iconos (usando SVGs inline para simplicidad si Lucide tarda en cargar, 
        // pero aquí usaremos nombres de clases para lucide-react si estuviera importado, 
        // como estamos en CDN puro, usaremos SVGs simples inline)
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const PauseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
        const ZapIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const BatteryIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="16" height="10" rx="2" ry="2"></rect><line x1="22" y1="11" x2="22" y2="13"></line></svg>;
        const PlugIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v6"></path><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"></path><path d="M9 2v6"></path><rect x="6" y="8" width="12" height="8" rx="2"></rect></svg>;

        const App = () => {
            const [mode, setMode] = useState('DC'); // 'AC' o 'DC'
            const [isPlaying, setIsPlaying] = useState(true);
            const [speed, setSpeed] = useState(1);
            
            // Referencias para el canvas de electrones
            const canvasRef = useRef(null);
            const graphRef = useRef(null);
            const requestRef = useRef();
            const timeRef = useRef(0);
            
            // Datos para la gráfica
            const historyRef = useRef([]);

            // Configuración de simulación
            const particleCount = 40;
            const particles = useRef([]);
            
            // Inicializar partículas
            useEffect(() => {
                const parts = [];
                for(let i = 0; i < particleCount; i++) {
                    parts.push({
                        x: Math.random() * 800, // Posición X inicial aleatoria
                        y: 30 + Math.random() * 40, // Dispersión en Y (simulando grosor del cable)
                        baseX: 0, // Para AC: punto central de oscilación
                        offset: Math.random() * Math.PI * 2 // Para variación visual
                    });
                }
                // Distribuir uniformemente para AC
                parts.forEach((p, i) => {
                    p.baseX = (800 / particleCount) * i;
                    // Si estamos en DC, x es aleatorio, si es AC, usaremos baseX
                });
                particles.current = parts;
            }, []);

            const animate = () => {
                // Actualizar tiempo
                if (isPlaying) {
                    timeRef.current += 0.05 * speed;
                }

                const time = timeRef.current;
                const canvas = canvasRef.current;
                const graphCanvas = graphRef.current;
                
                if (!canvas || !graphCanvas) return;

                const ctx = canvas.getContext('2d');
                const gCtx = graphCanvas.getContext('2d');
                
                // Limpiar Canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

                // --- DIBUJAR CABLE ---
                ctx.fillStyle = '#334155'; // Color gris oscuro (cable)
                ctx.fillRect(0, 20, canvas.width, 60);
                
                // Bordes del cable
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 20); ctx.lineTo(canvas.width, 20);
                ctx.moveTo(0, 80); ctx.lineTo(canvas.width, 80);
                ctx.stroke();

                // --- LÓGICA DE ELECTRONES ---
                const voltage = mode === 'DC' ? 1 : Math.sin(time); // DC = 1 (constante), AC = Onda Senoidal
                
                ctx.fillStyle = '#fbbf24'; // Color amarillo electrones
                
                particles.current.forEach((p, i) => {
                    let drawX = 0;

                    if (mode === 'DC') {
                        // Movimiento continuo a la derecha
                        // Usamos el tiempo para desplazar
                        // speed factor determina qué tan rápido van
                        p.x += 2 * speed * (isPlaying ? 1 : 0);
                        if (p.x > canvas.width) p.x = 0;
                        drawX = p.x;
                    } else {
                        // AC: Oscilación alrededor de un punto base (baseX)
                        // Amplitud de oscilación = 30px
                        drawX = p.baseX + Math.sin(time) * 30;
                    }

                    // Dibujar electrón
                    ctx.beginPath();
                    ctx.arc(drawX, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Brillo
                    ctx.fillStyle = 'rgba(251, 191, 36, 0.3)';
                    ctx.beginPath();
                    ctx.arc(drawX, p.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fbbf24';
                });

                // Flecha de dirección
                ctx.font = "20px Arial";
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                
                if (mode === 'DC') {
                    ctx.fillText("Flujo de Electrones →", canvas.width / 2, 110);
                } else {
                    // Flecha cambia según voltaje
                    const dir = voltage > 0 ? "→" : "←";
                    ctx.fillText(`Oscilación ${dir}`, canvas.width / 2, 110);
                }


                // --- DIBUJAR GRÁFICA (OSCILOSCOPIO) ---
                
                // Actualizar historial
                if (isPlaying) {
                    historyRef.current.push(voltage);
                    if (historyRef.current.length > graphCanvas.width) {
                        historyRef.current.shift();
                    }
                } else if (historyRef.current.length === 0) {
                     // Rellenar con 0 o 1 inicial si está vacío
                     historyRef.current = new Array(graphCanvas.width).fill(mode === 'DC' ? 1 : 0);
                }

                // Ejes
                gCtx.strokeStyle = '#cbd5e1';
                gCtx.lineWidth = 1;
                // Eje X (centro)
                gCtx.beginPath();
                gCtx.moveTo(0, graphCanvas.height / 2);
                gCtx.lineTo(graphCanvas.width, graphCanvas.height / 2);
                gCtx.stroke();
                
                // Dibujar onda
                gCtx.strokeStyle = mode === 'DC' ? '#ef4444' : '#3b82f6'; // Rojo para DC, Azul para AC
                gCtx.lineWidth = 3;
                gCtx.beginPath();

                const centerY = graphCanvas.height / 2;
                const scaleY = 40; // Altura de la onda

                for (let i = 0; i < historyRef.current.length; i++) {
                    const x = i;
                    // Invertimos Y porque canvas 0 es arriba
                    const y = centerY - (historyRef.current[i] * scaleY);
                    
                    if (i === 0) gCtx.moveTo(x, y);
                    else gCtx.lineTo(x, y);
                }
                gCtx.stroke();

                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [mode, isPlaying, speed]);

            // Resetear historial al cambiar modo para evitar líneas raras
            useEffect(() => {
                historyRef.current = [];
            }, [mode]);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    
                    <header className="text-center mb-8">
                        <h1 className="text-4xl font-bold text-slate-800 mb-2 flex items-center justify-center gap-3">
                            <ZapIcon /> Simulador AC vs DC
                        </h1>
                        <p className="text-slate-600 max-w-2xl mx-auto">
                            Visualiza la diferencia fundamental en el movimiento de electrones entre la Corriente Alterna y la Corriente Continua.
                        </p>
                    </header>

                    <div className="w-full max-w-5xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
                        
                        {/* Panel de Control y Visualización */}
                        <div className="p-6 md:w-2/3 border-r border-slate-100">
                            
                            {/* Selector */}
                            <div className="flex justify-center gap-4 mb-6">
                                <button 
                                    onClick={() => setMode('DC')}
                                    className={`flex items-center gap-2 px-6 py-3 rounded-full font-bold shadow-sm transition-all ${mode === 'DC' ? 'bg-red-500 text-white scale-105' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                >
                                    <BatteryIcon size={20} /> Corriente Continua (DC)
                                </button>
                                <button 
                                    onClick={() => setMode('AC')}
                                    className={`flex items-center gap-2 px-6 py-3 rounded-full font-bold shadow-sm transition-all ${mode === 'AC' ? 'bg-blue-500 text-white scale-105' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                >
                                    <PlugIcon size={20} /> Corriente Alterna (AC)
                                </button>
                            </div>

                            {/* Canvas del Cable */}
                            <div className="mb-2">
                                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">Movimiento de Electrones (Cable)</h3>
                                <canvas 
                                    ref={canvasRef} 
                                    width={600} 
                                    height={120} 
                                    className="w-full bg-slate-800 rounded-lg cursor-pointer"
                                    onClick={() => setIsPlaying(!isPlaying)}
                                />
                            </div>

                            {/* Canvas de la Gráfica */}
                            <div className="mb-6">
                                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">Voltaje vs Tiempo (Osciloscopio)</h3>
                                <canvas 
                                    ref={graphRef} 
                                    width={600} 
                                    height={150} 
                                    className="w-full bg-white border border-slate-200 rounded-lg"
                                />
                            </div>

                            {/* Controles de Reproducción */}
                            <div className="flex items-center justify-between bg-slate-50 p-4 rounded-lg">
                                <button 
                                    onClick={() => setIsPlaying(!isPlaying)}
                                    className="p-2 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors"
                                >
                                    {isPlaying ? <PauseIcon /> : <PlayIcon />}
                                </button>
                                
                                <div className="flex items-center gap-3 w-2/3">
                                    <span className="text-sm text-slate-600 font-medium">Velocidad / Frecuencia:</span>
                                    <input 
                                        type="range" 
                                        min="0.2" 
                                        max="3" 
                                        step="0.1" 
                                        value={speed}
                                        onChange={(e) => setSpeed(parseFloat(e.target.value))}
                                        className="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Panel de Información */}
                        <div className="p-6 md:w-1/3 bg-slate-50 flex flex-col justify-center">
                            <div className={`p-5 rounded-xl border-l-4 shadow-sm mb-6 ${mode === 'DC' ? 'bg-red-50 border-red-500' : 'bg-blue-50 border-blue-500'}`}>
                                <h2 className={`text-2xl font-bold mb-2 ${mode === 'DC' ? 'text-red-700' : 'text-blue-700'}`}>
                                    {mode === 'DC' ? 'Corriente Continua (DC)' : 'Corriente Alterna (AC)'}
                                </h2>
                                <p className="text-slate-700 leading-relaxed">
                                    {mode === 'DC' 
                                        ? "La corriente eléctrica fluye en una sola dirección constante. El voltaje se mantiene estable en el tiempo (línea recta)." 
                                        : "La corriente eléctrica cambia de dirección periódicamente. Los electrones vibran adelante y atrás. El voltaje varía formando una onda senoidal."}
                                </p>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <h4 className="font-bold text-slate-800">Fuente Típica</h4>
                                    <p className="text-sm text-slate-600">{mode === 'DC' ? 'Baterías, Pilas, Paneles Solares.' : 'Enchufes de pared, Red Eléctrica, Generadores.'}</p>
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800">Uso Principal</h4>
                                    <p className="text-sm text-slate-600">{mode === 'DC' ? 'Electrónica (Móviles, Laptops), Tiras LED.' : 'Electrodomésticos, Motores industriales, Iluminación general.'}</p>
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800">Factor Clave</h4>
                                    <p className="text-sm text-slate-600">{mode === 'DC' ? 'Ideal para circuitos digitales delicados.' : 'Eficiente para transportar energía a largas distancias.'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <footer className="mt-8 text-slate-400 text-sm">
                        Generado con React y Canvas API.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
