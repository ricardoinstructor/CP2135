<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Potencia Eléctrica</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate-900 oscuro */
            color: #f8fafc;
        }
        .container-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
        }
        .power-card {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .power-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .selected-card {
            border-color: #38bdf8; /* Sky-400 */
            background-color: #1e293b; /* Slate-800 */
        }
        .power-bar-fill {
            transition: width 0.5s ease-out;
            /* Añadir animación de flujo simulada */
            background-image: repeating-linear-gradient(-45deg, rgba(255,255,255, .15), rgba(255,255,255, .15) 10px, transparent 10px, transparent 20px);
            background-size: 40px 40px;
            animation: flow 0.5s linear infinite;
        }

        /* La animación se controla por JS para ajustar la velocidad */
        @keyframes flow {
            from { background-position: 0 0; }
            to { background-position: 40px 40px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // Datos de electrodomésticos con consumo típico y placeholders
        const APPLIANCES = [
            { id: 'bombilla', name: 'Bombilla LED (10W)', power: 10, imageUrl: 'https://placehold.co/100x100/34d399/white?text=BOMBILLA', color: 'bg-green-600' },
            { id: 'microondas', name: 'Microondas', power: 1000, imageUrl: 'https://placehold.co/100x100/f97316/white?text=MICROONDAS', color: 'bg-orange-600' },
            { id: 'ordenador', name: 'Ordenador de Escritorio', power: 300, imageUrl: 'https://placehold.co/100x100/3b82f6/white?text=PC', color: 'bg-blue-600' },
            { id: 'nevera', name: 'Nevera', power: 150, imageUrl: 'https://placehold.co/100x100/64748b/white?text=NEVERA', color: 'bg-slate-500' },
            { id: 'tv', name: 'Televisor (80W)', power: 80, imageUrl: 'https://placehold.co/100x100/facc15/black?text=TV', color: 'bg-yellow-500' },
            { id: 'secador', name: 'Secador de Pelo', power: 1500, imageUrl: 'https://placehold.co/100x100/ec4899/white?text=SECADOR', color: 'bg-pink-600' },
        ];

        const MAX_POWER_LIMIT = 5000; // Nuevo límite máximo para el circuito (5000W)
        const VOLTAGE = 220; // Voltaje estándar fijo (ej. 220V)

        // Componente para la Tarjeta de Electrodoméstico
        const ApplianceCard = ({ appliance, isSelected, toggleAppliance }) => {
            return (
                <div 
                    className={`power-card p-4 rounded-xl flex flex-col items-center bg-slate-700 hover:bg-slate-600 ${isSelected ? 'selected-card shadow-sky-400/30' : 'shadow-md shadow-slate-900/50'}`}
                    onClick={() => toggleAppliance(appliance.id, appliance.power)}
                >
                    <img 
                        src={appliance.imageUrl} 
                        alt={appliance.name} 
                        className="w-20 h-20 mb-2 rounded-full object-cover"
                        onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100/0f172a/white?text=IMG" }} // Fallback simple
                    />
                    <p className="text-center font-semibold text-white">{appliance.name}</p>
                    <p className={`text-sm font-bold ${appliance.color}`}>
                        {appliance.power} W
                    </p>
                    {isSelected && (
                        <span className="mt-2 text-xs font-bold text-sky-400 flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><path d="M22 4L12 14.01l-3-3"></path></svg>
                            ENCENDIDO
                        </span>
                    )}
                </div>
            );
        };

        // Componente principal de la aplicación
        const App = () => {
            // Mapa para rastrear qué electrodomésticos están encendidos
            const [activePower, setActivePower] = useState({});
            const powerBarRef = useRef(null);

            // Calcular el consumo total de potencia
            const totalPower = useMemo(() => {
                return Object.values(activePower).reduce((sum, power) => sum + power, 0);
            }, [activePower]);
            
            // Calcular la intensidad de corriente total (I = P / V)
            const totalCurrent = useMemo(() => {
                return totalPower / VOLTAGE;
            }, [totalPower]);

            const toggleAppliance = (id, power) => {
                setActivePower(prev => {
                    const newState = { ...prev };
                    if (newState[id]) {
                        // Apagar
                        delete newState[id];
                    } else {
                        // Encender
                        newState[id] = power;
                    }
                    return newState;
                });
            };

            // Ajustar la velocidad de la animación del flujo de corriente
            useEffect(() => {
                if (powerBarRef.current) {
                    // Mapear la corriente a la duración de la animación:
                    // Corriente baja -> animación lenta (ej. 2s)
                    // Corriente alta -> animación rápida (ej. 0.1s)
                    const maxCurrent = MAX_POWER_LIMIT / VOLTAGE; // Corriente máxima posible
                    const currentRatio = totalCurrent / maxCurrent; // 0 a 1
                    
                    // Asegurar que la velocidad mínima sea razonable
                    const animationDuration = Math.max(0.1, 1.5 - currentRatio * 1.5); // 1.5s a 0.1s
                    
                    powerBarRef.current.style.animationDuration = `${animationDuration}s`;
                }
            }, [totalCurrent]);


            const powerPercentage = Math.min(100, (totalPower / MAX_POWER_LIMIT) * 100);
            
            // Determinar el color de la barra según el nivel de riesgo
            const barColor = useMemo(() => {
                if (powerPercentage > 85) return 'bg-red-500';
                if (powerPercentage > 60) return 'bg-orange-500';
                return 'bg-green-500';
            }, [powerPercentage]);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    
                    <header className="text-center mb-10">
                        <h1 className="text-5xl font-extrabold text-sky-400 mb-2">
                            Simulador de Potencia (P) y Corriente (I)
                        </h1>
                        <p className="text-slate-400 max-w-4xl mx-auto mt-2 text-lg">
                            **Voltaje Fijo (V):** {VOLTAGE} V.
                            Observa cómo al aumentar la **Potencia (P)** (Vatios), se incrementa la **Intensidad de Corriente (I)** (Amperios) y el flujo de energía.
                        </p>
                    </header>

                    <div className="w-full max-w-6xl bg-slate-800 rounded-2xl container-shadow p-8 mb-8">
                        
                        <h2 className="text-3xl font-bold text-white mb-6 border-b border-slate-700 pb-3">
                            1. Electrodomésticos y Potencia (P)
                        </h2>

                        {/* Contenedor de Tarjetas */}
                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6">
                            {APPLIANCES.map(appliance => (
                                <ApplianceCard
                                    key={appliance.id}
                                    appliance={appliance}
                                    isSelected={!!activePower[appliance.id]}
                                    toggleAppliance={toggleAppliance}
                                />
                            ))}
                        </div>

                    </div>

                    <div className="w-full max-w-6xl bg-slate-800 rounded-2xl container-shadow p-8">

                        <h2 className="text-3xl font-bold text-white mb-6 border-b border-slate-700 pb-3">
                            2. Consumo Total: Potencia (P) e Intensidad (I)
                        </h2>
                        
                        <div className="flex justify-around items-center mb-8">
                            <div className="text-center">
                                <p className="text-5xl font-extrabold text-white">
                                    {totalPower} W
                                </p>
                                <span className="text-xl font-light text-slate-400 block mt-1">
                                    Potencia Actual (P)
                                </span>
                            </div>
                            <div className="text-center">
                                <p className="text-5xl font-extrabold text-sky-300">
                                    {totalCurrent.toFixed(2)} A
                                </p>
                                <span className="text-xl font-light text-slate-400 block mt-1">
                                    Corriente Actual (I)
                                </span>
                            </div>
                        </div>

                        {/* Barra Gráfica de Consumo (Flujo de Corriente) */}
                        <div className="relative h-10 w-full bg-slate-700 rounded-full overflow-hidden border border-slate-600">
                            <div 
                                ref={powerBarRef} // Referencia para controlar la animación
                                className={`power-bar-fill h-full rounded-full ${barColor}`} 
                                style={{ width: `${powerPercentage}%` }}
                            >
                                {/* Texto de la barra */}
                                <div className="absolute inset-0 flex items-center justify-start pl-4">
                                    <span className="font-bold text-sm text-white drop-shadow-lg">
                                        Flujo de Corriente (I)
                                    </span>
                                </div>
                            </div>
                        </div>
                        <p className="text-sm text-slate-400 mt-2 text-center">
                            La velocidad del patrón de la barra simula la **Intensidad de la Corriente** (Amperios).
                        </p>


                        {totalPower > MAX_POWER_LIMIT && (
                            <div className="mt-6 p-3 bg-red-800/50 border border-red-500 rounded-lg text-white font-semibold flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                                ¡PELIGRO DE SOBRECARGA! Has superado el consumo máximo de **{MAX_POWER_LIMIT} W** / **{(MAX_POWER_LIMIT / VOLTAGE).toFixed(2)} A**.
                            </div>
                        )}

                        <div className="mt-8">
                            <h3 className="text-xl font-semibold text-sky-400 mb-3">Detalle de Consumo Activo:</h3>
                            {Object.entries(activePower).length > 0 ? (
                                <ul className="space-y-2">
                                    {APPLIANCES.filter(a => activePower[a.id]).map(app => (
                                        <li key={app.id} className="flex justify-between items-center text-lg p-2 rounded-lg bg-slate-700/50">
                                            <span className="font-medium">{app.name}</span>
                                            <span className="font-extrabold text-sky-300">{app.power} W</span>
                                        </li>
                                    ))}
                                </ul>
                            ) : (
                                <p className="text-slate-400 italic">No hay electrodomésticos encendidos. Haz clic en las tarjetas para empezar.</p>
                            )}
                        </div>

                    </div>
                    
                    <footer className="mt-8 text-slate-400 text-sm">
                        Simulación de Potencia Eléctrica por Gemini.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
